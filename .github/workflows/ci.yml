name: CI

on:
  push:
    branches:
      - main
      - 'release/**'
  pull_request:
    branches:
      - main
      - 'release/**'

jobs:
  build-test:
    name: Build & test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      # corepack MUST be enabled before setup-node tries to cache pnpm
      - name: Enable corepack (pnpm)
        run: corepack enable

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Run unit tests
        run: pnpm test

      - name: Build app (Vite)
        run: pnpm build

  edge-smoke:
    name: Edge function smoke check
    runs-on: ubuntu-latest
    # Don't gate PRs from forks on a live URL check, and only run on push to main
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    needs: build-test
    steps:
      - name: Hit /health on make-server-64775d98
        env:
          EDGE_URL: https://qbexqpvzmssmifimlfos.functions.supabase.co/make-server-64775d98
          ANON_KEY: ${{ secrets.SUPABASE_ANON_KEY }}
        run: |
          set -euo pipefail
          if [ -z "${ANON_KEY:-}" ]; then
            echo "::warning::SUPABASE_ANON_KEY secret not set — skipping edge smoke check"
            exit 0
          fi
          echo "GET $EDGE_URL/health"
          status=$(curl -sS -o /tmp/health.json -w '%{http_code}' \
            -H "Authorization: Bearer $ANON_KEY" \
            -H "apikey: $ANON_KEY" \
            "$EDGE_URL/health")
          echo "HTTP $status"
          cat /tmp/health.json || true
          echo
          if [ "$status" != "200" ]; then
            echo "::error::Edge function /health returned $status"
            exit 1
          fi
