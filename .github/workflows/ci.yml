name: CI

on:
  push:
    branches:
      - main
      - feature/panels-quickview
  pull_request:
    branches:
      - main

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'pnpm'
      - name: Install dependencies
        run: |
          corepack enable
          pnpm install
      - name: Run tests
        run: pnpm test
